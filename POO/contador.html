<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POO</title>
</head>
<body>
    <script>
        class Contador { 
            #contador // propriedade privada
            constructor() {
                this.#contador = 0
            }

            incrementar() {
                this.#contador++
            }

            valorAtual() {
                return this.#contador
            }
        }

        const contador = new Contador()

        contador.incrementar()
        console.log(contador.valorAtual())
    </script>
</body>
</html>
