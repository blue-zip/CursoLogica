    <script>


        class ContaBancaria {
            #saldo // propriedade privada

            constructor(saldoInicial) {
                this.#saldo = saldoInicial
            }

            get saldo(){
                return `O saldo atual é de ${this.#saldo}`
            }

            set saldo(novoSaldo) {
                console.log("O saldo só é acessivel através do método sacar()")
            }

            depositar(valor){
                if(valor > 0){
                    this.#saldo += valor
                    console.log("O valor de ", valor, "foi depositado com sucessoe agora o saldo é de", this.#saldo)
                }
            }

            sacar(valor){
                if(valor > 0 && this.#saldo >= valor){
                    this.#saldo -= valor
                    console.log("O valor de ", valor, "foi sacado com sucesso e agora o saldo é de", this.#saldo)
                } else {
                    console.log("Saldo insuficiente para realizar o saque de ", valor)
                }
            }
        }

        const minhaConta = new ContaBancaria(100)

        minhaConta.saldo = 1000
        minhaConta.sacar(50)
        minhaConta.depositar(200)
        minhaConta.sacar(300)
        minhaConta.sacar(250)

        console.log(minhaConta.saldo)

        minhaConta.depositar(500)
        console.log(minhaConta.saldo)
