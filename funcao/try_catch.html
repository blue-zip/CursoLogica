<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1>try ... catch(error)</h1>

    <div id="output"></div>

    <script>


        let obj = {nome: "Daniel", email: "daniel@server.com"}

        // obj = null

        try {
            document.getElementById("output").innerHTML = `Nome: ${obj.nome} - Email: ${obj.email}`
        } catch(e) {
            console.log(e)
            console.log(e.message)
            alert("deu ruim " + e.message)
        } finally {
            // alert("fim do programa")
        }


        
    </script>

    <script src="areas.js"></script>

    <script>
        try{
            console.log(calcularAreaRetangulo(2, "r"))
        } catch(e) {
            alert(`deu ruim: ${e.message} `)
        }

        try{
            let areaTriangulo = calcularAreaRetangulo(3, "!")
            document.getElementById("output").innerHTML = `a area do triangulo ${areaTriangulo}`

        }catch(e) {
            console.log(e)
        }

        try{
            let areaCirculo = calcularAreaCirculo("R")
            document.getElementById("output").innerHTML = `a area do circulo ${areaCirculo}`
        }catch(e) {
            console.log(e)
        }

        alert("fim do programa")


    </script>
</body>
</html>
