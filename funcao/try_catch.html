<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1>try ... catch(error)</h1>

    <div id="output"></div>

    <script>


        let obj = {nome: "Daniel", email: "daniel@server.com"}

        // obj = null

        try {
            document.getElementById("output").innerHTML = `Nome: ${obj.nome} - Email: ${obj.email}`
        } catch(e) {
            console.log(e)
            console.log(e.message)
            alert("deu ruim " + e.message)
        } finally {
            alert("fim do programa")
        }


        
    </script>
</body>
</html>
