<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafios</title>

<body>
   
    
    <script>


        function somar(n1, n2) {
            return n1 + n2
        }
        // console.log(somer(2, 4))
        let resultado = somar(2, 4)
        console.log(resultado)

        function calcular(n1, n2, simbolo) {
            switch (simbolo) {
                case "+":
                    return n1 + n2
                case "-":
                    return n1 - n2
                case "*": 
                    return n1 * n2
                case "/": 
                    return n1 / n2
                default: 
                    return null
            }
        }

        console.log(calcular(3, 3, "+"))
        console.log(calcular(3, 3, "-"))
        console.log(calcular(3, 3, "*"))
        console.log(calcular(3, 3, "/"))
        console.log(calcular(3, 3, "a"))

        function ePar(n) {
            if (!isNaN(n)) {
                if (n % 2 == 0) {
                    return true
                } else {
                    return false
                }
            } else {
                return `isso não e um numero`
            }
        }

        console.log(ePar(4))
        console.log(ePar(5))
        console.log(ePar("h"))

    </script>


</body>
</html>
