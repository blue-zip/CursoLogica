<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafios</title>
</head>
<body>
   
    
    <script>


        function somar(n1, n2) {
            return n1 + n2
        }
        // console.log(somer(2, 4))
        let resultado = somar(2, 4)
        console.log(resultado)

        function calcular(n1, n2, simbolo) {
            switch (simbolo) {
                case "+":
                    return n1 + n2
                case "-":
                    return n1 - n2
                case "*": 
                    return n1 * n2
                case "/": 
                    return n1 / n2
                default: 
                    return null
            }
        }

        console.log(calcular(3, 3, "+"))
        console.log(calcular(3, 3, "-"))
        console.log(calcular(3, 3, "*"))
        console.log(calcular(3, 3, "/"))
        console.log(calcular(3, 3, "a"))

        function ehPar(n) {
            return n % 2 === 0
        }

        console.log(ehPar(5)) // console.log(false)
        console.log(ehPar(4)) // console.log(true)

    </script>


</body>
</html>
