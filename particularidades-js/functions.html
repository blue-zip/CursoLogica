<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>functions</title>
</head>
<body>
    <h1>Functions<h1>

    <script>
        // functions declarations
        function ola1(nome) {
            console.log("ola de function declaration, " + nome)
        }

        // functions expressions
        const ola2 = function (nome) {
            console.log("ola de function expression, " + nome)
        }

        
    </script>
</body>
</html>
