<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipos primitivos</title>
</head>
<body>
    <h1>tipos primitivos</h1>

    <p>Em javascript, há dois tipos de dados possiveis: primitivos (passados por valores) e objetos (passados por referencia)</p>
    <ul>
        <li>String</li>
        <li>Number</li>
        <li>Boolean</li>
        <li>Null</li>
        <li>String</li>
        <li>Symbol (ES2015)</li>
    </ul>

    <script>

        let n = 10

        function teste(n) {
            console.log("n interno funcão teste",++n)

            
        }

        teste(n) // valor 20

        console.log("n externo", n)

        const arr = [1, 2, 3] // endereco na memoria ax123

        function adicionarNaArray(valor, arr) {
            arr[arr.length] = valor
        }

        function limpaArray(arr){
            arr.length = 0
        }

        // adicionarNaArray("novo valor", [1,2,3])
        // adicionarNaArray("novo valor", ax123)
        
        console.log(arr)
        
        limpaArray(arr)
        adicionarNaArray("novo valor", arr)


        console.log(arr)

        const obj = {nome: "Daniel"}

        function adicionarPropEmObjeto(prop, valor, obj){
            if (obj[prop] === undefined) {
                obj[prop] = valor
            }
        }

        adicionarPropEmObjeto("sobrenome", "maria", obj)

        console.log(obj)

    </script>
</body>
</html>
