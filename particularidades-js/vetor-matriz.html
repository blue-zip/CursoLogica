<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vetor, Array, Lista e Matriz</title>
</head>
<body>
    <h1>Vector, Array, Lista e Matriz</h1>

    <script>

        const notas = [ [3, 5, 6, 1], [2, 8, 4, 9], [10, 3, 5, 7] ]

        console.log(notas[1])
        console.log(notas[1][2])

        console.log(notas[2][1])

        for(let i = 0; i < notas.length; i++){
            const NotasAluno = notas[i]
            console.log(NotasAluno)

            for (let j = 0; j < NotasAluno.length; j++) {
                // console.log(NotasAluno[j])
                console.log(notas[i][j])
            }
        }
    </script>
</body>
</html>
